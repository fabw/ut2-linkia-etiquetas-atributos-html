<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Actividad 2 - Etiquetas y atributos HTML</title>
</head>
<body>
    
    <div class="container mt-5">
        <h1 class="mb-4">Página web de ejemplo con HTML</h1>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="img/bootstrap-fill.svg" alt="Logotipo de Bootstrap" width="30" height="24" class="d-inline-block align-text-top">
                    Bootstrap
                </a>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Acerca de</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Correo</a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
    
    <div class="container mt-5">
        <form>
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="exampleInputEmail1" name="correo" placeholder="Introduce tu correo" required aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text">No compartiremos tu correo con ninguna otra persona.</div>
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="exampleInputPassword1" name="contrasena" placeholder="Introduce tu contraseña" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="exampleCheck1" name="recordar">
                <label class="form-check-label" for="exampleCheck1">Recordarme</label>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>

    <div class="container mt-5">
        <h2>Imagen de ejemplo</h2>
        <img src="img/html-bootstrap.png" alt="Imagen representativa de HTML y Bootstrap" width="300" height="150">
    </div>

    <div class="container mt-5">
        <p>Visita <a href="https://www.w3schools.com/" target="_blank" rel="noopener noreferrer" title="Ir a W3Schools">W3Schools</a> para aprender más sobre HTML.</p>
    </div>

    <div class="container mt-5">
        <table class="table table-sm table-bordered w-auto">
            <thead class="table-light">
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Curso</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Fran</td>
                    <td>HTML</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Ana</td>
                    <td>CSS</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
